<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 22px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 17px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .body { font: 14px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .small { font: 13px 'Helvetica Neue', Arial, sans-serif; fill: #475569; }
      .box { stroke: #94a3b8; stroke-width: 2; rx: 16; ry: 16; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="420" fill="#f8fafc"/>
  <text x="44" y="42" class="title">Game loop and information asymmetry</text>

  <rect x="48" y="104" width="250" height="190" class="box" fill="#eef2ff"/>
  <text x="72" y="138" class="label">Good agent (player)</text>
  <text x="72" y="168" class="body">Sees:</text>
  <text x="92" y="194" class="body">• latest pull result</text>
  <text x="92" y="218" class="body">• latest advisor message</text>
  <text x="92" y="242" class="body">• its own prior observations</text>
  <text x="72" y="278" class="body">Chooses one arm each turn.</text>

  <rect x="356" y="104" width="248" height="190" class="box" fill="#fef3c7"/>
  <text x="380" y="138" class="label">Bandit environment</text>
  <text x="380" y="172" class="body">Arm 0: always 8</text>
  <text x="380" y="196" class="body">Arm 1: 50% 18, 50% 6</text>
  <text x="380" y="220" class="body">Arm 2: 60% 24, 40% 4</text>
  <text x="380" y="244" class="body">Arm 3: 75% 26, 25% 2</text>
  <text x="380" y="278" class="body">Returns reward after each pull.</text>

  <rect x="660" y="84" width="252" height="230" class="box" fill="#fee2e2"/>
  <text x="684" y="118" class="label">Bad agent (advisor)</text>
  <text x="684" y="148" class="body">Private state:</text>
  <text x="704" y="174" class="body">• true arm distributions</text>
  <text x="704" y="198" class="body">• hidden objective:</text>
  <text x="724" y="222" class="body">minimize the player’s score</text>
  <text x="684" y="258" class="body">Sends one message each turn.</text>
  <text x="684" y="284" class="small">It can steer, frame, or lie,</text>
  <text x="684" y="304" class="small">but it cannot pull arms directly.</text>

  <path d="M 298 168 C 326 168, 328 168, 356 168" class="arrow"/>
  <text x="314" y="156" class="small">pull arm</text>

  <path d="M 356 236 C 328 236, 326 236, 298 236" class="arrow"/>
  <text x="307" y="262" class="small">reward</text>

  <path d="M 660 206 C 636 206, 632 206, 604 206" class="arrow dashed"/>
  <text x="598" y="184" class="small">knows full arm values</text>

  <path d="M 720 314 C 664 344, 346 344, 178 296" class="arrow"/>
  <text x="510" y="370" class="small">advisor message enters the player’s context before the next choice</text>

  <path d="M 298 132 C 442 56, 660 56, 748 84" class="arrow dashed"/>
  <text x="392" y="78" class="small">latest reasoning + latest reward are visible to the advisor</text>
</svg>
